<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>To Do List</h1>

        <div class="input-box">
            <input type="text" id="todoInput" placeholder="Enter a task...">
            <button onclick="addTodo()">Add</button>
        </div>

        <h2 class="task-heading">
            <img src="images/list.png" class="heading-icon" alt="List">
            Task List
        </h2>

        <div class="task-container">
            <div id="todoList"></div>
        </div>

        <div class="count">
            Completed:
            <span id="completed">0</span> |
            Uncompleted:
            <span id="remaining">0</span>
        </div>
    </div>

    <script>
        const todoContainer = document.getElementById("todoList");

        function loadTodoItems() {

            const todoItems = getTodoItemsFromLS();

            todoContainer.innerHTML = "";

            let completed = 0;

            for (let i = 0; i < todoItems.length; i++) {

                const currentItem = todoItems[i];

                if (currentItem.completed) completed++;

                todoContainer.innerHTML += `
        <div class="todo">

            <div class="left">

                <input
                    type="checkbox"
                    ${currentItem.completed ? "checked" : ""}
                    onchange="toggleTodoItem(${i})">

                <span class="${currentItem.completed ? "completed" : ""}">
                    ${currentItem.text}
                </span>

            </div>

            <div class="actions">

                <img src="images/edit.png"
                     class="icon"
                     alt="Edit"
                     onclick="editTodoItem(${i})">

                <img src="images/delete.png"
                     class="icon"
                     alt="Delete"
                     onclick="deleteTodoItem(${i})">

            </div>

        </div>
        `;
            }

            document.getElementById("completed").innerText = completed;
            document.getElementById("remaining").innerText = todoItems.length - completed;
        }

        loadTodoItems();

        function addTodo() {

            const todoInputElement = document.getElementById("todoInput");

            if (todoInputElement.value.trim() === "") return;

            const storedTodoItems = getTodoItemsFromLS();

            storedTodoItems.push({
                text: todoInputElement.value,
                completed: false
            });

            setTodoItemsToLS(storedTodoItems);

            todoInputElement.value = "";

            loadTodoItems();
        }

        function toggleTodoItem(index) {

            const storedTodoItems = getTodoItemsFromLS();

            storedTodoItems[index].completed = !storedTodoItems[index].completed;

            setTodoItemsToLS(storedTodoItems);

            loadTodoItems();
        }

        function editTodoItem(index) {

            const storedTodoItems = getTodoItemsFromLS();

            const updatedItem = prompt("Edit Task", storedTodoItems[index].text);

            if (updatedItem !== null && updatedItem.trim() !== "") {

                storedTodoItems[index].text = updatedItem;

                setTodoItemsToLS(storedTodoItems);

                loadTodoItems();
            }
        }

        function deleteTodoItem(index) {

            const storedTodoItems = getTodoItemsFromLS();

            storedTodoItems.splice(index, 1);

            setTodoItemsToLS(storedTodoItems);

            loadTodoItems();
        }

        function getTodoItemsFromLS() {

            return JSON.parse(localStorage.getItem("TODO_ITEMS")) || [];
        }

        function setTodoItemsToLS(todoItems) {

            localStorage.setItem("TODO_ITEMS", JSON.stringify(todoItems));
        }
    

    </script>


</body>

</html>
