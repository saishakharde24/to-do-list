<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="style.css">
</head>


    <div class="container">
        <h1>To Do List</h1>

        <div class="input-box">
            <input type="text" id="todoInput" placeholder="Enter a task...">
            <button>Add</button>
        </div>

        <h2 class="task-heading">
            <img src="images/list.png" class="heading-icon" alt="List">
            Task List
        </h2>

        <div class="task-container">
            <div id="todoList"></div>
        </div>

        <div class="count">
            Completed:
            <span id="completed">0</span> |
            Uncompleted:
            <span id="remaining">0</span>
        </div>
    </div>


    

           

</html>
